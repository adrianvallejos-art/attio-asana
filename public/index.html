<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding Sync — Attio ↔ Asana</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 span { color: #6c72e6; }

    .refresh-btn {
      background: #2d3148;
      border: 1px solid #3d4168;
      color: #a0aec0;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }

    .refresh-btn:hover { background: #3d4168; color: #fff; }
    .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }

    .container { max-width: 1280px; margin: 0 auto; padding: 24px 28px; }

    /* Summary cards */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px 18px;
    }

    .card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #718096; margin-bottom: 6px; }
    .card .value { font-size: 28px; font-weight: 700; }
    .card.ok .value { color: #48bb78; }
    .card.failed .value { color: #fc8181; }
    .card.warn .value { color: #f6ad55; }
    .card.info .value { color: #63b3ed; }
    .card.muted .value { color: #718096; }

    /* Filters */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #2d3148;
      background: transparent;
      color: #718096;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: #2d3148;
      color: #e2e8f0;
      border-color: #3d4168;
    }

    .search-input {
      margin-left: auto;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 7px 14px;
      color: #e2e8f0;
      font-size: 13px;
      width: 240px;
      outline: none;
    }

    .search-input:focus { border-color: #6c72e6; }
    .search-input::placeholder { color: #4a5568; }

    /* Table */
    .table-wrap {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    thead th {
      padding: 11px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #4a5568;
      border-bottom: 1px solid #2d3148;
      background: #141720;
      white-space: nowrap;
      overflow: hidden;
      user-select: none;
    }

    thead th.sortable {
      cursor: pointer;
    }

    thead th.sortable:hover { color: #a0aec0; }
    thead th.sort-asc, thead th.sort-desc { color: #e2e8f0; }

    thead th .sort-icon { margin-left: 4px; opacity: .5; font-style: normal; }
    thead th.sort-asc .sort-icon, thead th.sort-desc .sort-icon { opacity: 1; }

    /* Column widths */
    thead th:nth-child(1) { width: 5%; }    /* Expand */
    thead th:nth-child(2) { width: 26%; }   /* Proyecto */
    thead th:nth-child(3) { width: 9%; }    /* Estado */
    thead th:nth-child(4) { width: 9%; }    /* Creación */
    thead th:nth-child(5) { width: 13%; }   /* Attio ID */
    thead th:nth-child(6) { width: 6%; }    /* Webhook */
    thead th:nth-child(7) { width: 10%; }   /* Último sync */
    thead th:nth-child(8) { width: 9%; }    /* Sync status */
    thead th:nth-child(9) { width: 13%; }   /* Acciones */

    tbody tr {
      border-bottom: 1px solid #1e2235;
      transition: background .1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1e2235; }

    td { padding: 11px 12px; font-size: 12px; vertical-align: middle; overflow: hidden; }

    /* Expand chevron */
    .expand-btn {
      background: none;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all .15s;
      line-height: 1;
    }
    .expand-btn:hover { color: #e2e8f0; background: #2d3148; }
    .expand-btn.open { color: #6c72e6; transform: rotate(180deg); }

    .project-name { font-weight: 500; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: block; }
    .project-name a {
      color: inherit;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .project-name a:hover { color: #6c72e6; }

    .attio-id {
      font-family: monospace;
      font-size: 11px;
      color: #718096;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.ok { background: #1a3a2a; color: #48bb78; }
    .badge.failed { background: #3a1a1a; color: #fc8181; }
    .badge.warn { background: #3a2a1a; color: #f6ad55; }
    .badge.info { background: #1a2a3a; color: #63b3ed; }
    .badge.muted { background: #2d3148; color: #718096; }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* Asana project color */
    .asana-color {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      flex-shrink: 0;
    }

    .asana-color.green { background: #48bb78; }
    .asana-color.yellow { background: #f6ad55; }
    .asana-color.red { background: #fc8181; }
    .asana-color.blue { background: #63b3ed; }
    .asana-color.complete { background: #9f7aea; }

    /* Actions column */
    .action-btn {
      background: #2d3148;
      border: 1px solid #3d4168;
      color: #a0aec0;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: all .15s;
      white-space: nowrap;
    }

    .action-btn:hover { background: #3d4168; color: #fff; }
    .action-btn.primary { background: #3d3f8f; border-color: #6c72e6; color: #c3c6ff; }
    .action-btn.primary:hover { background: #6c72e6; color: #fff; }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Detail panel */
    .detail-panel {
      display: none;
      background: #141720;
      border-top: 1px solid #2d3148;
    }

    .detail-panel.open { display: block; }

    .detail-inner {
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .detail-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #4a5568;
      margin-bottom: 10px;
    }

    .detail-field {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 6px 0;
      border-bottom: 1px solid #1e2235;
      font-size: 12px;
      gap: 12px;
    }

    .detail-field:last-child { border-bottom: none; }
    .detail-field .key { color: #718096; flex-shrink: 0; }
    .detail-field .val { color: #e2e8f0; text-align: right; word-break: break-all; font-family: monospace; font-size: 11px; }

    .history-item {
      padding: 8px 10px;
      border-radius: 6px;
      background: #1a1d27;
      margin-bottom: 6px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .history-item .time { color: #4a5568; font-size: 11px; white-space: nowrap; }
    .history-item .err { color: #fc8181; font-size: 11px; margin-top: 3px; }

    /* Attio ID input inline */
    /* IDs editable form */
    .ids-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .ids-form .field-group label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #4a5568;
      margin-bottom: 5px;
    }

    .ids-form .field-group input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #3d4168;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 7px 10px;
      font-size: 11px;
      font-family: monospace;
      outline: none;
    }

    .ids-form .field-group input:focus { border-color: #6c72e6; }

    .ids-form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }

    /* Loading / empty */
    .loading, .empty {
      text-align: center;
      padding: 60px 20px;
      color: #4a5568;
      font-size: 14px;
    }

    .loading .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2d3148;
      border-top-color: #6c72e6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #2d3148;
      border: 1px solid #3d4168;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: #e2e8f0;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all .25s;
      max-width: 320px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: #48bb78; color: #48bb78; }
    .toast.error { border-color: #fc8181; color: #fc8181; }

    .last-updated { font-size: 11px; color: #4a5568; margin-left: 8px; }

    /* Notes panel */
    .note-item {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .note-item .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 4px;
    }

    .note-item .note-title {
      font-weight: 600;
      color: #e2e8f0;
      flex: 1;
    }

    .note-item .note-date {
      color: #4a5568;
      font-size: 11px;
      white-space: nowrap;
    }

    .note-item .note-preview {
      color: #718096;
      font-size: 11px;
      white-space: pre-wrap;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item .delete-btn {
      background: transparent;
      border: 1px solid #3a1a1a;
      color: #fc8181;
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .note-item .delete-btn:hover { background: #3a1a1a; }

    /* Work-status toggle */
    .work-toggle {
      display: flex;
      gap: 4px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 24px;
      padding: 3px;
    }

    .work-toggle button {
      padding: 5px 16px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: #718096;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .work-toggle button.active {
      background: #2d3148;
      color: #e2e8f0;
    }

    .badge.closed { background: #1e2235; color: #4a5568; }
    .badge.active-proj { background: #1a3a2a; color: #48bb78; }
  </style>
</head>
<body>

<header>
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6c72e6" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    Onboarding Sync <span>Attio ↔ Asana</span>
    <span class="last-updated" id="lastUpdated"></span>
  </h1>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Actualizar</button>
</header>

<div class="container">

  <!-- Summary cards -->
  <div class="summary" id="summary">
    <div class="card muted"><div class="label">Total proyectos</div><div class="value" id="s-total">—</div></div>
    <div class="card ok"><div class="label">Trabajo activo</div><div class="value" id="s-active">—</div></div>
    <div class="card muted"><div class="label">Trabajo cerrado</div><div class="value" id="s-closed">—</div></div>
    <div class="card ok"><div class="label">Sincronizados</div><div class="value" id="s-ok">—</div></div>
    <div class="card failed"><div class="label">Con errores</div><div class="value" id="s-failed">—</div></div>
    <div class="card info"><div class="label">Sin Attio ID</div><div class="value" id="s-noid">—</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" style="flex-wrap:wrap;gap:8px;">
    <!-- Row 1: work status + collection -->
    <div style="display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap;">
      <div class="work-toggle">
        <button id="ws-active" class="active" onclick="setWorkStatus('active', this)">Trabajo sin finalizar</button>
        <button id="ws-closed" onclick="setWorkStatus('closed', this)">Trabajo cerrado</button>
        <button id="ws-all" onclick="setWorkStatus('all', this)">Todos</button>
      </div>
      <div style="width:1px;height:20px;background:#2d3148;"></div>
      <span style="font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:.06em;">Portfolio</span>
      <div id="collectionFilter" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>

    <!-- Row 2: sync status + search -->
    <div style="display:flex;align-items:center;gap:6px;width:100%;flex-wrap:wrap;">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todos</button>
      <button class="filter-btn" data-filter="sync_failed" onclick="setFilter('sync_failed', this)">Con errores</button>
      <button class="filter-btn" data-filter="no_webhook" onclick="setFilter('no_webhook', this)">Sin webhook</button>
      <button class="filter-btn" data-filter="no_attio_id" onclick="setFilter('no_attio_id', this)">Sin Attio ID</button>
      <button class="filter-btn" data-filter="never_synced" onclick="setFilter('never_synced', this)">Sin sincronizar</button>
      <button class="filter-btn" data-filter="ok" onclick="setFilter('ok', this)">OK</button>
      <input class="search-input" type="text" placeholder="Buscar proyecto..." oninput="setSearch(this.value)" />
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th class="sortable" onclick="setSort('name')">Proyecto <i class="sort-icon" id="si-name">↕</i></th>
          <th class="sortable" onclick="setSort('is_closed')">Estado <i class="sort-icon" id="si-is_closed">↕</i></th>
          <th class="sortable" onclick="setSort('created_at')">Creación <i class="sort-icon" id="si-created_at">↕</i></th>
          <th class="sortable" onclick="setSort('attio_record_id')">Attio ONB ID <i class="sort-icon" id="si-attio_record_id">↕</i></th>
          <th class="sortable" onclick="setSort('has_webhook')">Webhook <i class="sort-icon" id="si-has_webhook">↕</i></th>
          <th class="sortable" onclick="setSort('last_sync')">Último sync <i class="sort-icon" id="si-last_sync">↕</i></th>
          <th class="sortable" onclick="setSort('status')">Sync status <i class="sort-icon" id="si-status">↕</i></th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9"><div class="loading"><div class="spinner"></div>Cargando proyectos...</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';  // same origin
  let allProjects = [];
  let currentFilter = 'all';
  let currentWorkStatus = 'active';
  let currentSearch = '';
  let currentCollection = 'all';
  let openRow = null;
  let currentSort = { col: null, dir: 'asc' };

  function setSort(col) {
    if (currentSort.col === col) {
      currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      currentSort = { col, dir: 'asc' };
    }
    // Update header indicators
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
    });
    const icons = document.querySelectorAll('.sort-icon');
    icons.forEach(i => i.textContent = '↕');
    const icon = document.getElementById(`si-${col}`);
    if (icon) {
      icon.textContent = currentSort.dir === 'asc' ? '↑' : '↓';
      icon.closest('th').classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
    renderTable();
  }

  function sortProjects(projects) {
    const { col, dir } = currentSort;
    if (!col) return projects;
    const mul = dir === 'asc' ? 1 : -1;
    return [...projects].sort((a, b) => {
      let va, vb;
      if (col === 'last_sync') {
        va = a.last_sync?.created_at || '';
        vb = b.last_sync?.created_at || '';
      } else if (col === 'has_webhook') {
        va = a.has_webhook ? 1 : 0;
        vb = b.has_webhook ? 1 : 0;
      } else if (col === 'is_closed') {
        va = a.is_closed ? 1 : 0;
        vb = b.is_closed ? 1 : 0;
      } else {
        va = (a[col] || '').toString().toLowerCase();
        vb = (b[col] || '').toString().toLowerCase();
      }
      if (va < vb) return -1 * mul;
      if (va > vb) return  1 * mul;
      return 0;
    });
  }

  async function loadData() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '↻ Cargando...';

    try {
      const res = await fetch(`${API}/api/dashboard-data`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Error desconocido');

      allProjects = data.projects || [];
      buildCollectionFilter();
      renderTable();  // renderTable also calls updateSummary with filtered data

      const now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('lastUpdated').textContent = `· Actualizado ${now}`;
    } catch (e) {
      showToast('Error al cargar datos: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Actualizar';
    }
  }

  function updateSummaryFromProjects(projects) {
    document.getElementById('s-total').textContent = projects.length;
    document.getElementById('s-active').textContent = projects.filter(p => !p.is_closed).length;
    document.getElementById('s-closed').textContent = projects.filter(p => p.is_closed).length;
    document.getElementById('s-ok').textContent = projects.filter(p => p.status === 'ok').length;
    document.getElementById('s-failed').textContent = projects.filter(p => p.status === 'sync_failed').length;
    document.getElementById('s-noid').textContent = projects.filter(p => p.status === 'no_attio_id').length;
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  function setWorkStatus(ws, el) {
    currentWorkStatus = ws;
    document.querySelectorAll('.work-toggle button').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  function setCollection(val) {
    currentCollection = val;
    document.querySelectorAll('.coll-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.coll === val);
    });
    renderTable();
  }

  function buildCollectionFilter() {
    const portfolios = [...new Set(allProjects.map(p => p.portfolio))].sort();
    const container = document.getElementById('collectionFilter');
    if (!container) return;
    container.innerHTML = [
      `<button class="filter-btn coll-btn active" data-coll="all" onclick="setCollection('all')">Todos</button>`,
      ...portfolios.map(t =>
        `<button class="filter-btn coll-btn" data-coll="${escHtml(t)}" onclick="setCollection('${escHtml(t)}')">${escHtml(t)}</button>`
      )
    ].join('');
  }

  function setSearch(q) {
    currentSearch = q.toLowerCase();
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    openRow = null;

    let projects = allProjects;

    if (currentWorkStatus === 'active') {
      projects = projects.filter(p => !p.is_closed);
    } else if (currentWorkStatus === 'closed') {
      projects = projects.filter(p => p.is_closed);
    }

    if (currentCollection !== 'all') {
      projects = projects.filter(p => p.portfolio === currentCollection);
    }

    if (currentFilter !== 'all') {
      projects = projects.filter(p => p.status === currentFilter);
    }

    // Update summary cards to reflect current filters (before search/sort)
    updateSummaryFromProjects(projects);

    if (currentSearch) {
      projects = projects.filter(p =>
        p.name?.toLowerCase().includes(currentSearch) ||
        p.attio_record_id?.toLowerCase().includes(currentSearch)
      );
    }

    projects = sortProjects(projects);

    if (projects.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty">No hay proyectos para mostrar</div></td></tr>`;
      return;
    }

    tbody.innerHTML = projects.map(p => projectRow(p)).join('');
  }

  function statusBadge(p) {
    const map = {
      ok:           `<span class="badge ok"><span class="dot"></span>Sincronizado</span>`,
      sync_failed:  `<span class="badge failed"><span class="dot"></span>Error en sync</span>`,
      no_webhook:   `<span class="badge warn"><span class="dot"></span>Sin webhook</span>`,
      no_attio_id:  `<span class="badge info"><span class="dot"></span>Sin Attio ID</span>`,
      never_synced: `<span class="badge muted"><span class="dot"></span>Sin sincronizar</span>`,
    };
    return map[p.status] || `<span class="badge muted">${p.status}</span>`;
  }

  function asanaColor(color) {
    if (!color) return '';
    return `<span class="asana-color ${color}"></span>`;
  }

  function relativeTime(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'hace un momento';
    if (mins < 60) return `hace ${mins}m`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `hace ${hrs}h`;
    return `hace ${Math.floor(hrs / 24)}d`;
  }

  function projectRow(p) {
    const asanaUrl = `https://app.asana.com/0/${p.gid}/list`;
    const attioUrl = p.attio_record_id
      ? `https://app.attio.com/atomchat/custom/onboardings/record/${p.attio_record_id}/overview`
      : null;

    const attioCell = p.attio_record_id
      ? `<a href="${attioUrl}" target="_blank" class="attio-id" title="${p.attio_record_id}">${p.attio_record_id.split('-')[0]}…</a>`
      : `<span style="color:#4a5568;font-size:11px;">No configurado</span>`;

    const webhookCell = p.has_webhook
      ? `<span class="badge ok" style="font-size:10px;">Activo</span>`
      : `<span class="badge muted" style="font-size:10px;">No</span>`;

    const lastSync = p.last_sync
      ? `<span title="${p.last_sync.created_at}">${relativeTime(p.last_sync.created_at)}</span>`
      : `<span style="color:#4a5568">Nunca</span>`;

    let actions = '';
    if (!p.has_webhook && p.attio_record_id) {
      actions += `<button class="action-btn primary" onclick="registerWebhook(event,'${p.gid}','${p.attio_record_id}')">+ Webhook</button> `;
    }
    if (p.attio_record_id) {
      actions += `<button class="action-btn" onclick="triggerSync(event,'${p.gid}','${p.attio_record_id}')">▶ Sync</button>`;
    }

    const closedLabel = p.asana_status_title || (p.is_closed ? 'Cerrado' : 'Activo');
    const closedBadge = p.is_closed
      ? `<span class="badge closed" style="font-size:10px;" title="${closedLabel}">${closedLabel}</span>`
      : `<span class="badge active-proj" style="font-size:10px;" title="${closedLabel}">${closedLabel}</span>`;

    const createdDate = p.created_at
      ? new Date(p.created_at).toLocaleDateString('es', { day: '2-digit', month: 'short', year: '2-digit' })
      : '—';

    return `
      <tr id="row-${p.gid}">
        <td style="text-align:center;padding:8px 4px;">
          <button class="expand-btn" id="expand-${p.gid}" onclick="toggleDetail('${p.gid}')" title="Ver detalle">▼</button>
        </td>
        <td>
          <span class="project-name">
            <a href="${asanaUrl}" target="_blank" title="${escHtml(p.name)}">${escHtml(p.name)}</a>
          </span>
        </td>
        <td>${closedBadge}</td>
        <td style="color:#718096;font-size:11px;">${createdDate}</td>
        <td>${attioCell}</td>
        <td>${webhookCell}</td>
        <td>${lastSync}</td>
        <td>${statusBadge(p)}</td>
        <td>${actions}</td>
      </tr>
      <tr id="detail-${p.gid}">
        <td colspan="9" style="padding:0;">
          <div class="detail-panel" id="panel-${p.gid}">
            ${renderDetail(p)}
          </div>
        </td>
      </tr>
    `;
  }

  function renderDetail(p) {
    const attioUrl = p.attio_record_id
      ? `https://app.attio.com/atomchat/custom/onboardings/record/${p.attio_record_id}/overview`
      : null;

    const historyHtml = p.sync_history.length > 0
      ? p.sync_history.map(e => `
          <div class="history-item">
            <div>
              <span class="badge ${e.status === 'completed' ? 'ok' : e.status === 'failed' ? 'failed' : 'muted'}" style="font-size:10px;">${e.status}</span>
              &nbsp;${e.event_type}
              ${e.note_created === false ? '<span style="color:#f6ad55;font-size:10px;margin-left:6px;">nota omitida</span>' : ''}
              ${e.error_message ? `<div class="err">${e.error_message}</div>` : ''}
            </div>
            <span class="time">${relativeTime(e.created_at)}</span>
          </div>
        `).join('')
      : '<div style="color:#4a5568;font-size:12px;">Sin historial de sync</div>';

    const idsSection = `
      <div class="detail-section" style="grid-column:1/-1;">
        <h4>IDs del proyecto</h4>
        <div class="ids-form">
          <div class="field-group">
            <label>Atom ID ${p.atom_id_from_name ? '<span style="color:#f6ad55;font-size:9px;">· extraído del nombre</span>' : ''}</label>
            <input type="text" id="f-atom-${p.gid}" value="${escHtml(p.atom_id || p.atom_id_from_name || '')}" placeholder="CjWHj789BDG2iZYDYhL1" />
          </div>
          <div class="field-group">
            <label>Attio Company ID</label>
            <input type="text" id="f-company-${p.gid}" value="${escHtml(p.attio_company_id || '')}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
          </div>
          <div class="field-group">
            <label>Attio ONB ID</label>
            <input type="text" id="f-onb-${p.gid}" value="${escHtml(p.attio_record_id || '')}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
          </div>
        </div>
        <div class="ids-form-footer">
          <button class="action-btn primary" onclick="saveProjectIds('${p.gid}')">Guardar en Asana</button>
        </div>
      </div>
    `;

    return `
      <div class="detail-inner">
        <div class="detail-section">
          <h4>Información del proyecto</h4>
          <div class="detail-field"><span class="key">Asana GID</span><span class="val">${p.gid}</span></div>
          <div class="detail-field"><span class="key">Estado Asana</span><span class="val">${p.asana_status_title || (p.is_closed ? 'Cerrado' : 'Activo')}</span></div>
          <div class="detail-field"><span class="key">Webhook</span><span class="val">${p.webhook_gid || '—'}</span></div>
          <div class="detail-field"><span class="key">Mapping en BD</span><span class="val">${p.has_mapping ? 'Sí' : 'No'}</span></div>
          ${p.attio_record_id ? `<div class="detail-field"><span class="key">Ver ONB Attio</span><span class="val"><a href="${attioUrl}" target="_blank" style="color:#6c72e6;">Abrir →</a></span></div>` : ''}
          ${p.attio_company_id ? `<div class="detail-field"><span class="key">Ver Company Attio</span><span class="val"><a href="https://app.attio.com/atomchat/companies/record/${p.attio_company_id}/overview" target="_blank" style="color:#6c72e6;">Abrir →</a></span></div>` : ''}
        </div>
        <div class="detail-section">
          <h4>Historial de sincronización</h4>
          ${historyHtml}
        </div>
        ${idsSection}
        ${p.attio_record_id ? `
        <div class="detail-section" style="grid-column:1/-1;">
          <h4 style="display:flex;justify-content:space-between;align-items:center;">
            Notas en Attio
            <button class="action-btn" onclick="loadNotes('${p.gid}','${p.attio_record_id}')">Cargar notas</button>
          </h4>
          <div id="notes-${p.gid}">
            <div style="color:#4a5568;font-size:12px;">Haz clic en "Cargar notas" para ver las notas de este onboarding.</div>
          </div>
        </div>` : ''}
      </div>
    `;
  }

  function toggleDetail(gid) {
    const panel = document.getElementById(`panel-${gid}`);
    if (!panel) return;

    if (openRow && openRow !== gid) {
      const prev = document.getElementById(`panel-${openRow}`);
      if (prev) prev.classList.remove('open');
      const prevBtn = document.getElementById(`expand-${openRow}`);
      if (prevBtn) prevBtn.classList.remove('open');
    }

    panel.classList.toggle('open');
    const btn = document.getElementById(`expand-${gid}`);
    if (btn) btn.classList.toggle('open', panel.classList.contains('open'));
    openRow = panel.classList.contains('open') ? gid : null;
  }

  async function registerWebhook(evt, gid, attioId) {
    evt.stopPropagation();
    showToast('Registrando webhook...', '');
    try {
      const res = await fetch('/api/register-webhook', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ asana_project_gid: gid, attio_record_id: attioId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      showToast('Webhook registrado correctamente', 'success');
      setTimeout(loadData, 1000);
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    }
  }

  async function triggerSync(evt, gid, attioId) {
    evt.stopPropagation();
    showToast('Disparando sync...', '');
    try {
      const res = await fetch('/api/test-sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ asana_project_gid: gid, attio_record_id: attioId, dry_run: false }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      const noteOk = data.note_created === true || data.note?.status === 'created';
      showToast(noteOk ? 'Nota creada en Attio ✓' : 'Sync ejecutado (nota omitida)', noteOk ? 'success' : '');
      setTimeout(loadData, 1500);
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    }
  }

  async function saveProjectIds(gid) {
    const project = allProjects.find(p => p.gid === gid);
    if (!project) return;

    const atomId   = document.getElementById(`f-atom-${gid}`)?.value?.trim() || null;
    const companyId = document.getElementById(`f-company-${gid}`)?.value?.trim() || null;
    const onbId    = document.getElementById(`f-onb-${gid}`)?.value?.trim() || null;

    if (onbId && !/^[0-9a-f-]{36}$/i.test(onbId)) {
      showToast('Attio ONB ID inválido — formato: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx', 'error');
      return;
    }
    if (companyId && !/^[0-9a-f-]{36}$/i.test(companyId)) {
      showToast('Attio Company ID inválido — formato: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx', 'error');
      return;
    }

    showToast('Guardando en Asana...', '');
    try {
      const res = await fetch('/api/update-project-fields', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          asana_project_gid: gid,
          field_gids: project.field_gids || {},
          atom_id: atomId,
          attio_company_id: companyId,
          attio_onb_id: onbId,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      let msg = 'Guardado en Asana ✓';
      if (data.webhook_registered) msg += ' — webhook registrado';
      else if (data.mapping_upserted) msg += ' — mapping actualizado';
      showToast(msg, 'success');
      setTimeout(loadData, 1200);
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    }
  }

  async function loadNotes(gid, attioId) {
    const container = document.getElementById(`notes-${gid}`);
    if (!container) return;
    container.innerHTML = '<div style="color:#4a5568;font-size:12px;">Cargando notas...</div>';

    try {
      const res = await fetch(`/api/attio-notes?attio_record_id=${attioId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const notes = data.notes || [];
      if (notes.length === 0) {
        container.innerHTML = '<div style="color:#4a5568;font-size:12px;">Sin notas en Attio.</div>';
        return;
      }

      container.innerHTML = notes.map(n => `
        <div class="note-item" id="note-item-${n.id}">
          <div class="note-header">
            <span class="note-title">${escHtml(n.title || '(sin título)')}</span>
            <span class="note-date">${n.created_at ? new Date(n.created_at).toLocaleString('es', {dateStyle:'short',timeStyle:'short'}) : '—'}</span>
            <button class="delete-btn" onclick="deleteNote('${n.id}','${gid}','${attioId}')">Eliminar</button>
          </div>
          <div class="note-preview">${escHtml((n.content || '').slice(0, 200))}</div>
        </div>
      `).join('');
    } catch (e) {
      container.innerHTML = `<div style="color:#fc8181;font-size:12px;">Error: ${e.message}</div>`;
    }
  }

  async function deleteNote(noteId, gid, attioId) {
    if (!confirm('¿Eliminar esta nota de Attio? Esta acción no se puede deshacer.')) return;
    try {
      const res = await fetch('/api/attio-notes', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note_id: noteId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      document.getElementById(`note-item-${noteId}`)?.remove();
      showToast('Nota eliminada', 'success');
      const container = document.getElementById(`notes-${gid}`);
      if (container && container.querySelectorAll('.note-item').length === 0) {
        container.innerHTML = '<div style="color:#4a5568;font-size:12px;">Sin notas en Attio.</div>';
      }
    } catch (e) {
      showToast('Error al eliminar: ' + e.message, 'error');
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type || ''}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  // Auto-refresh every 60s
  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
